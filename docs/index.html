<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>响哥 AI 早报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═════════════════════════════════════════════════════════════
   设计语言: 「阅读库」(Reading Library) 风
   - 灵感: Readwise + Are.na + Notion 数据库
   - 信息密度: 高(单屏可见多卡片)
   - 主色: 米白纸 + 墨黑 + 信号色编码
   ═════════════════════════════════════════════════════════════ */
:root {
  --bg:          #fafaf7;
  --bg-2:        #f0eee8;
  --bg-3:        #e6e2d6;
  --ink:         #1a1714;
  --ink-2:       #4a463e;
  --ink-3:       #7a7466;
  --ink-4:       #a09a8a;
  --accent:      #c2410c;
  --accent-2:    #b8860b;
  --line:        #d4cebd;
  --line-2:      #e8e3d2;

  --sig-strong:  #2d5016;
  --sig-medium:  #7a5e1c;
  --sig-weak:    #8b3a3a;

  --dim-product:    #0369a1;
  --dim-case:       #16a34a;
  --dim-money:      #ca8a04;
  --dim-org:        #9333ea;
  --dim-infra:      #475569;
  --dim-research:   #0891b2;
  --dim-regulation: #b91c1c;
  --dim-china:      #be123c;
  --dim-tools:      #047857;
  --dim-tier0:      #7c2d12;
  --dim-top5:       #c2410c;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:    #14110d;
    --bg-2:  #1c1813;
    --bg-3:  #24201a;
    --ink:   #f5f1e8;
    --ink-2: #d4cdb8;
    --ink-3: #9b9381;
    --ink-4: #6a6457;
    --line:   #36312a;
    --line-2: #2a2620;
    --accent:  #fb923c;
    --accent-2: #fbbf24;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 15px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 0.93rem;
  line-height: 1.5;
  min-height: 100vh;
}

/* ═════ 顶栏 ═════ */
header {
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
}

.topbar {
  max-width: 1500px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 280px 1fr auto;
  align-items: center;
  padding: 14px 32px;
  gap: 24px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.brand .logo {
  font-family: 'Noto Serif SC', serif;
  font-weight: 900;
  font-size: 1.25rem;
  letter-spacing: -0.01em;
}

.brand .logo::before {
  content: "◆ ";
  color: var(--accent);
  font-size: 0.6em;
  vertical-align: 0.5em;
}

.brand .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.searchbox {
  position: relative;
  width: 100%;
  max-width: 560px;
}

.searchbox input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 14px 9px 38px;
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: all 0.15s ease;
}

.searchbox input::placeholder { color: var(--ink-4); }
.searchbox input:focus {
  border-color: var(--accent);
  background: var(--bg);
  box-shadow: 0 0 0 3px rgba(194, 65, 12, 0.1);
}

.searchbox::before {
  content: "⌕";
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-3);
  font-size: 1.1rem;
}

.searchbox .kbd {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink-4);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 1px 5px;
}

.utility {
  display: flex;
  gap: 6px;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-3);
}

.utility .meta-pill {
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 4px 10px;
  border-radius: 12px;
}

/* ═════ 主体 ═════ */
.main {
  max-width: 1500px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 0;
  min-height: calc(100vh - 64px);
}

@media (max-width: 1100px) {
  .topbar { grid-template-columns: 1fr; padding: 12px 16px; gap: 12px; }
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .sidebar.mobile-open { display: block; }
}

/* ═════ 左侧:标签筛选器 ═════ */
.sidebar {
  border-right: 1px solid var(--line);
  padding: 24px 20px;
  position: sticky;
  top: 64px;
  align-self: start;
  max-height: calc(100vh - 64px);
  overflow-y: auto;
}

.sidebar h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
  margin-top: 18px;
}
.sidebar h4:first-child { margin-top: 0; }

.filter-list {
  list-style: none;
  font-size: 0.83rem;
}

.filter-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 8px;
  margin: 1px 0;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.1s ease;
  color: var(--ink-2);
}

.filter-item:hover { background: var(--bg-2); color: var(--ink); }

.filter-item.active {
  background: var(--ink);
  color: var(--bg);
}
.filter-item.active .filter-count { color: var(--bg); opacity: 0.7; }

.filter-item .filter-label {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.filter-item .dim-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.filter-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-3);
  margin-left: 8px;
  flex-shrink: 0;
}

.clear-filters {
  margin-top: 12px;
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-3);
  cursor: pointer;
  width: 100%;
  text-align: center;
}
.clear-filters:hover { background: var(--bg-2); color: var(--ink); }

/* ═════ 右侧:文章列表 ═════ */
.content {
  padding: 24px 32px;
  min-width: 0;
}

.content-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.content-title {
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 1.5rem;
  line-height: 1.2;
}

.content-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--ink-3);
  letter-spacing: 0.05em;
}

.view-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.view-tab {
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 5px 12px;
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  cursor: pointer;
  color: var(--ink-2);
  transition: all 0.1s ease;
}

.view-tab:hover { background: var(--bg-3); }
.view-tab.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

/* ═════ 文章卡片 ═════ */
.article-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--line-2);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--line);
}

.article-card {
  background: var(--bg);
  padding: 14px 18px;
  cursor: pointer;
  transition: background 0.1s ease;
}

.article-card:hover { background: var(--bg-2); }

.article-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--ink-3);
  letter-spacing: 0.04em;
}

.article-card-header .date {
  font-weight: 500;
  color: var(--ink-2);
}

.article-card-header .dim-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 7px;
  border-radius: 3px;
  font-size: 0.65rem;
  font-weight: 500;
  background: var(--bg-2);
  border: 1px solid var(--line);
}

.article-card-header .dim-tag::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.article-card-header .top5-flag,
.article-card-header .tier0-flag {
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--accent);
  color: white;
  font-size: 0.6rem;
}
.article-card-header .tier0-flag { background: var(--dim-tier0); }

.article-card-header .quality {
  margin-left: auto;
  color: var(--ink-4);
}

.article-title {
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 1.02rem;
  line-height: 1.4;
  color: var(--ink);
  margin: 2px 0 4px;
}

.article-summary {
  font-size: 0.86rem;
  color: var(--ink-2);
  line-height: 1.6;
  margin-bottom: 6px;
  max-height: 6.4em;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
}

.article-card.expanded .article-summary {
  max-height: none;
  display: block;
  -webkit-line-clamp: unset;
}

.article-meaning {
  background: var(--bg-2);
  border-left: 3px solid var(--accent-2);
  padding: 6px 12px;
  font-size: 0.78rem;
  color: var(--ink-2);
  margin-top: 6px;
  font-family: 'Noto Serif SC', serif;
  font-style: italic;
  line-height: 1.5;
}

.article-meaning::before {
  content: "📌 ";
  font-style: normal;
}

.article-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--ink-3);
}

.company-chip {
  padding: 1px 7px;
  border-radius: 10px;
  background: var(--bg-3);
  color: var(--ink-2);
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  border: 1px solid var(--line-2);
}

.company-chip:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.article-footer .source-line {
  color: var(--ink-3);
}

.article-footer a {
  color: var(--accent);
  text-decoration: none;
}

.article-footer a:hover { text-decoration: underline; }

/* 维度颜色 */
.dim-product   { color: var(--dim-product); border-color: var(--dim-product); }
.dim-case      { color: var(--dim-case); border-color: var(--dim-case); }
.dim-money     { color: var(--dim-money); border-color: var(--dim-money); }
.dim-org       { color: var(--dim-org); border-color: var(--dim-org); }
.dim-infra     { color: var(--dim-infra); border-color: var(--dim-infra); }
.dim-research  { color: var(--dim-research); border-color: var(--dim-research); }
.dim-regulation{ color: var(--dim-regulation); border-color: var(--dim-regulation); }
.dim-china     { color: var(--dim-china); border-color: var(--dim-china); }
.dim-tools     { color: var(--dim-tools); border-color: var(--dim-tools); }
.dim-tier0     { color: var(--dim-tier0); border-color: var(--dim-tier0); }
.dim-top5      { color: var(--dim-top5); border-color: var(--dim-top5); }

.dim-product   ~ .dim-dot, .dot-product   { background: var(--dim-product); }
.dim-case      ~ .dim-dot, .dot-case      { background: var(--dim-case); }
.dim-money     ~ .dim-dot, .dot-money     { background: var(--dim-money); }
.dim-org       ~ .dim-dot, .dot-org       { background: var(--dim-org); }
.dim-infra     ~ .dim-dot, .dot-infra     { background: var(--dim-infra); }
.dim-research  ~ .dim-dot, .dot-research  { background: var(--dim-research); }
.dim-regulation~ .dim-dot, .dot-regulation{ background: var(--dim-regulation); }
.dim-china     ~ .dim-dot, .dot-china     { background: var(--dim-china); }
.dim-tools     ~ .dim-dot, .dot-tools     { background: var(--dim-tools); }
.dim-tier0     ~ .dim-dot, .dot-tier0     { background: var(--dim-tier0); }
.dim-top5      ~ .dim-dot, .dot-top5      { background: var(--dim-top5); }

/* ═════ 空状态 ═════ */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-3);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
}

.empty::before {
  content: "◇";
  display: block;
  font-size: 2.5rem;
  margin-bottom: 12px;
  color: var(--ink-4);
}

.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-3);
  font-family: 'JetBrains Mono', monospace;
}

.loading::before {
  content: "◆ ◇ ◆";
  display: block;
  font-size: 1.5rem;
  margin-bottom: 12px;
  color: var(--accent);
  animation: pulse 1.4s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ═════ 搜索高亮 ═════ */
mark {
  background: rgba(194, 65, 12, 0.2);
  color: var(--ink);
  padding: 0 2px;
  border-radius: 2px;
}

/* ═════ 顶部 active filter 提示 ═════ */
.active-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}

.active-filter {
  background: var(--ink);
  color: var(--bg);
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.72rem;
  font-family: 'JetBrains Mono', monospace;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.active-filter .remove {
  cursor: pointer;
  opacity: 0.7;
}

.active-filter .remove:hover { opacity: 1; }

/* ═════ 详情查看 (modal-style) ═════ */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 17, 13, 0.6);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 32px;
  backdrop-filter: blur(4px);
}

.detail-overlay.open { display: flex; }

.detail-panel {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  max-width: 800px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.detail-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-2);
}

.detail-close:hover { background: var(--bg-3); color: var(--ink); }

/* ═════ 滚动条美化 ═════ */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-2); }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

/* ═════ 收藏按钮 ═════ */
.bookmark-btn {
  margin-left: auto;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 3px 8px;
  cursor: pointer;
  font-size: 0.9rem;
  line-height: 1;
  color: var(--ink-3);
  transition: all 0.15s ease;
  user-select: none;
}

.bookmark-btn:hover {
  background: var(--bg-2);
  color: var(--accent);
  border-color: var(--accent);
}

.bookmark-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.bookmark-btn.active:hover {
  background: transparent;
  color: var(--accent);
}

/* ═════ 收藏 modal 面板 ═════ */
.bookmark-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 17, 13, 0.45);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(3px);
}

.bookmark-modal-overlay.open { display: flex; }

.bookmark-modal {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 10px;
  max-width: 480px;
  width: 100%;
  padding: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.bookmark-modal h3 {
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 1.1rem;
  margin-bottom: 4px;
}

.bookmark-modal .bm-target {
  font-size: 0.83rem;
  color: var(--ink-3);
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line-2);
  line-height: 1.4;
}

.bookmark-modal label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-3);
  margin-bottom: 6px;
  margin-top: 14px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.bookmark-modal textarea,
.bookmark-modal input[type="text"] {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  color: var(--ink);
  background: var(--bg);
  outline: none;
  resize: vertical;
}

.bookmark-modal textarea:focus,
.bookmark-modal input[type="text"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(194, 65, 12, 0.1);
}

.bookmark-modal textarea {
  min-height: 60px;
  font-family: 'Noto Serif SC', serif;
  line-height: 1.55;
}

.bookmark-modal .tag-hint {
  font-size: 0.7rem;
  color: var(--ink-4);
  margin-top: 4px;
  font-style: italic;
}

/* 🆕 已有标签快速选择区 */
.existing-tags-area {
  margin-top: 14px;
  padding: 10px 12px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 6px;
}

.existing-tags-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-3);
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}

.existing-tags-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-height: 120px;
  overflow-y: auto;
}

.existing-tag-chip {
  background: var(--bg);
  border: 1px solid var(--line);
  padding: 3px 10px;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.12s ease;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  user-select: none;
}

.existing-tag-chip::before {
  content: "#";
  color: var(--ink-4);
  font-size: 0.85em;
}

.existing-tag-chip:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.existing-tag-chip:hover::before { color: white; opacity: 0.6; }

.existing-tag-chip.selected {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.existing-tag-chip.selected::before { color: white; opacity: 0.6; }

.existing-tag-chip .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65em;
  opacity: 0.6;
}

.bookmark-modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 22px;

<body>

<script>
// ═══════════════════════════════════════════════════════════════════
// 数据加载
// ═══════════════════════════════════════════════════════════════════
let DATA = null;
let activeFilters = {
  view: 'all',           // all / favorites / top5 / tier0 / recent7
  dimension: null,
  company: null,
  myTag: null,           // 个人标签筛选
  searchTerm: '',
  sort: 'date-desc',
  favRange: 'all',       // 收藏视图的时间范围: today / week / month / all
};

// ═══════════════════════════════════════════════════════════════════
// 收藏管理(localStorage)
// ═══════════════════════════════════════════════════════════════════
const FAV_STORAGE_KEY = 'zhuanxing-favorites';

function loadFavorites() {
  try {
    const raw = localStorage.getItem(FAV_STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    console.error('加载收藏失败:', e);
    return {};
  }
}

function saveFavorites(favorites) {
  try {
    localStorage.setItem(FAV_STORAGE_KEY, JSON.stringify(favorites));
    return true;
  } catch (e) {
    console.error('保存收藏失败:', e);
    showToast('保存失败:存储空间已满');
    return false;
  }
}

let FAVORITES = loadFavorites();

function isFavorited(articleId) {
  return !!FAVORITES[articleId];
}

function addFavorite(articleId, note = '', tags = []) {
  FAVORITES[articleId] = {
    collected_at: new Date().toISOString(),
    note: note.trim(),
    tags: tags.map(t => t.trim()).filter(Boolean),
  };
  saveFavorites(FAVORITES);
}

function updateFavorite(articleId, note, tags) {
  if (FAVORITES[articleId]) {
    FAVORITES[articleId].note = note.trim();
    FAVORITES[articleId].tags = tags.map(t => t.trim()).filter(Boolean);
    saveFavorites(FAVORITES);
  }
}

function removeFavorite(articleId) {
  delete FAVORITES[articleId];
  saveFavorites(FAVORITES);
}

function getAllMyTags() {
  const counter = {};
  for (const id in FAVORITES) {
    for (const t of FAVORITES[id].tags || []) {
      counter[t] = (counter[t] || 0) + 1;
    }
  }
  return Object.entries(counter).sort((a, b) => b[1] - a[1]);
}

const DIM_COLOR_MAP = {
  '🚀 产品':      'product',
  '🏢 案例':      'case',
  '💰 商业':      'money',
  '👥 组织':      'org',
  '⚙️ 基础设施':   'infra',
  '📊 咨询':      'research',
  '⚖️ 监管':      'regulation',
  '🇨🇳 国内':     'china',
  '🛠 工具与开源': 'tools',
  '🧠 Tier 0':   'tier0',
  '🌟 Top 5':    'top5',
};

function getDimClass(dim) {
  return DIM_COLOR_MAP[dim] || 'product';
}

async function load() {
  try {
    const res = await fetch('./data/index.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    init();
  } catch (e) {
    document.getElementById('article-list').innerHTML = `
      <div class="empty">
        加载索引失败: ${e.message}<br>
        请检查 docs/data/index.json 是否存在。<br>
        本地预览需先运行 python scripts/build_index.py
      </div>`;
  }
}

function init() {
  document.getElementById('stat-total-reports').textContent = DATA.meta.total_reports + ' 份早报';
  document.getElementById('stat-total-articles').textContent = DATA.meta.total_articles + ' 篇';

  renderViewCounts();
  renderDimensionList();
  renderCompanyList();
  renderMyTagList();
  renderArticles();
  setupEvents();
}

// ═══════════════════════════════════════════════════════════════════
// 渲染左侧侧边栏
// ═══════════════════════════════════════════════════════════════════

function renderViewCounts() {
  document.getElementById('count-all').textContent = DATA.articles.length;
  document.getElementById('count-top5').textContent = DATA.articles.filter(a => a.is_top5).length;
  document.getElementById('count-tier0').textContent = DATA.articles.filter(a => a.is_tier0).length;
  document.getElementById('count-favorites').textContent = Object.keys(FAVORITES).length;

  // 最近 7 天
  if (DATA.reports.length > 0) {
    const latest = new Date(DATA.reports[0].date);
    const cutoff = new Date(latest.getTime() - 6 * 86400000);
    const recent7 = DATA.articles.filter(a => new Date(a.date) >= cutoff).length;
    document.getElementById('count-recent7').textContent = recent7;
  }
}

function renderMyTagList() {
  const list = document.getElementById('mytag-list');
  const tags = getAllMyTags();
  if (tags.length === 0) {
    list.innerHTML = '<li class="fav-empty" style="padding: 16px 8px; font-size: 0.75rem;">尚无个人标签<br><span style="opacity:0.7;">收藏时加 #标签 就会出现在这里</span></li>';
    return;
  }
  list.innerHTML = '';
  for (const [tag, count] of tags) {
    const li = document.createElement('li');
    li.className = 'filter-item';
    li.dataset.mytag = tag;
    if (activeFilters.myTag === tag) li.classList.add('active');
    li.innerHTML = `
      <span class="filter-label">#${tag}</span>
      <span class="filter-count">${count}</span>
    `;
    list.appendChild(li);
  }
  // 绑事件
  list.querySelectorAll('[data-mytag]').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.mytag;
      activeFilters.myTag = (activeFilters.myTag === t) ? null : t;
      activeFilters.view = 'favorites';  // 点 myTag 自动切到收藏视图
      renderActiveFilterStates();
      renderArticles();
    });
  });
}

function renderDimensionList() {
  const list = document.getElementById('dimension-list');
  list.innerHTML = '';
  for (const [dim, count] of Object.entries(DATA.tag_index.dimensions)) {
    const cls = getDimClass(dim);
    const li = document.createElement('li');
    li.className = 'filter-item';
    li.dataset.dimension = dim;
    li.innerHTML = `
      <span class="filter-label">
        <span class="dim-dot dot-${cls}"></span>
        ${dim}
      </span>
      <span class="filter-count">${count}</span>
    `;
    list.appendChild(li);
  }
}

function renderCompanyList() {
  const list = document.getElementById('company-list');
  list.innerHTML = '';
  // 取前 25 家
  const top = Object.entries(DATA.tag_index.companies).slice(0, 25);
  for (const [company, count] of top) {
    const li = document.createElement('li');
    li.className = 'filter-item';
    li.dataset.company = company;
    li.innerHTML = `
      <span class="filter-label">${company}</span>
      <span class="filter-count">${count}</span>
    `;
    list.appendChild(li);
  }
}

// ═══════════════════════════════════════════════════════════════════
// 主要的文章列表渲染逻辑
// ═══════════════════════════════════════════════════════════════════
function renderArticles() {
  // ⭐ 特殊路径:收藏视图(独立分支,带按日聚合 + 时间范围)
  if (activeFilters.view === 'favorites') {
    renderFavoritesView();
    return;
  }

  let articles = [...DATA.articles];

  // 视图筛选
  if (activeFilters.view === 'top5') {
    articles = articles.filter(a => a.is_top5);
  } else if (activeFilters.view === 'tier0') {
    articles = articles.filter(a => a.is_tier0);
  } else if (activeFilters.view === 'recent7') {
    const latest = new Date(DATA.reports[0].date);
    const cutoff = new Date(latest.getTime() - 6 * 86400000);
    articles = articles.filter(a => new Date(a.date) >= cutoff);
  }

  // 维度筛选
  if (activeFilters.dimension) {
    articles = articles.filter(a => a.dimension === activeFilters.dimension);
  }

  // 公司筛选
  if (activeFilters.company) {
    articles = articles.filter(a => a.companies.includes(activeFilters.company));
  }

  // 搜索
  if (activeFilters.searchTerm) {
    const term = activeFilters.searchTerm.toLowerCase();
    articles = articles.filter(a =>
      a.title.toLowerCase().includes(term) ||
      a.summary.toLowerCase().includes(term) ||
      a.meaning.toLowerCase().includes(term) ||
      a.companies.some(c => c.toLowerCase().includes(term))
    );
  }

  // 排序
  if (activeFilters.sort === 'date-desc') {
    articles.sort((a, b) => b.date.localeCompare(a.date) || a.id.localeCompare(b.id));
  } else if (activeFilters.sort === 'date-asc') {
    articles.sort((a, b) => a.date.localeCompare(b.date) || a.id.localeCompare(b.id));
  } else if (activeFilters.sort === 'quality-desc') {
    articles.sort((a, b) => b.quality_score - a.quality_score);
  } else if (activeFilters.sort === 'dimension') {
    articles.sort((a, b) => (a.dimension || '').localeCompare(b.dimension || ''));
  }

  // 更新计数
  document.getElementById('content-meta').textContent = `${articles.length} 篇 · ${DATA.meta.total_reports} 份早报`;

  // 渲染 active filter 标签
  renderActiveFiltersBar();

  // 渲染卡片
  const listEl = document.getElementById('article-list');
  if (articles.length === 0) {
    listEl.innerHTML = '<div class="empty">无匹配文章<br>试试清空筛选,或换个关键词</div>';
    return;
  }

  listEl.innerHTML = articles.map(a => renderCard(a)).join('');

  // 卡片点击事件
  listEl.querySelectorAll('.article-card').forEach((el, idx) => {
    el.addEventListener('click', (e) => {
      // 点收藏按钮 → 打开收藏面板
      if (e.target.classList.contains('bookmark-btn') || e.target.closest('.bookmark-btn')) {
        e.stopPropagation();
        const btn = e.target.classList.contains('bookmark-btn') ? e.target : e.target.closest('.bookmark-btn');
        const id = btn.dataset.bookmarkId;
        openBookmarkModal(id);
        return;
      }
      // 点我的标签 → 切换到收藏视图 + 该标签筛选
      if (e.target.classList.contains('my-tag')) {
        e.stopPropagation();
        const tag = e.target.dataset.mytag;
        activeFilters.view = 'favorites';
        activeFilters.myTag = tag;
        renderActiveFilterStates();
        renderArticles();
        return;
      }
      // 如果点的是公司 chip,改成筛选
      if (e.target.classList.contains('company-chip')) {
        e.stopPropagation();
        const company = e.target.textContent;
        activeFilters.company = company;
        renderActiveFilterStates();
        renderArticles();
        return;
      }
      // 否则展开/收起
      el.classList.toggle('expanded');
    });
  });

  // 更新标题
  updateContentTitle();
}

function renderCard(a) {
  const dimClass = getDimClass(a.dimension);
  const isTop5 = a.is_top5;
  const isTier0 = a.is_tier0;
  const hl = (s) => highlight(s, activeFilters.searchTerm);
  const fav = FAVORITES[a.id];
  const isFav = !!fav;

  let companyChips = (a.companies || []).slice(0, 6).map(c =>
    `<span class="company-chip">${c}</span>`
  ).join('');

  // 个人备注 + 标签(仅已收藏的文章显示)
  let myNoteHtml = '';
  if (isFav && fav.note) {
    myNoteHtml = `<div class="my-note">${escapeHtml(fav.note)}</div>`;
  }
  let myTagsHtml = '';
  if (isFav && fav.tags && fav.tags.length > 0) {
    myTagsHtml = '<div class="my-tags">' +
      fav.tags.map(t => `<span class="my-tag" data-mytag="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join('') +
      '</div>';
  }

  return `
    <article class="article-card" data-id="${a.id}">
      <div class="article-card-header">
        <span class="date">${a.date}</span>
        ${isTop5 ? '<span class="top5-flag">TOP 5</span>' : ''}
        ${isTier0 ? '<span class="tier0-flag">TIER 0</span>' : ''}
        <span class="dim-tag dim-${dimClass}">${a.dimension || ''}</span>
        <span class="quality">${a.quality_score}/8</span>
        <button class="bookmark-btn ${isFav ? 'active' : ''}" data-bookmark-id="${a.id}" title="${isFav ? '已收藏(点击编辑)' : '加入收藏'}">${isFav ? '🔖' : '🔖'}</button>
      </div>
      <h3 class="article-title">${hl(a.title)}</h3>
      ${a.summary ? `<div class="article-summary">${hl(a.summary)}</div>` : ''}
      ${a.meaning ? `<div class="article-meaning">${hl(a.meaning)}</div>` : ''}
      ${myNoteHtml}
      ${myTagsHtml}
      <div class="article-footer">
        ${companyChips}
        ${a.source ? `<span class="source-line">来源:${a.source}</span>` : ''}
        ${a.url ? `<a href="${a.url}" target="_blank" rel="noopener">原文 ↗</a>` : ''}
      </div>
    </article>
  `;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ═══════════════════════════════════════════════════════════════════
// 🔖 收藏视图(按"收藏日期"+"原文早报日期"双维度组织)
// ═══════════════════════════════════════════════════════════════════
function renderFavoritesView() {
  const listEl = document.getElementById('article-list');
  const titleEl = document.getElementById('content-title');
  const metaEl = document.getElementById('content-meta');

  titleEl.textContent = '🔖 我的收藏';

  // 把所有收藏的 article 取出来,附加收藏元数据
  let collected = [];
  for (const id in FAVORITES) {
    const article = DATA.articles.find(a => a.id === id);
    if (article) {
      collected.push({
        ...article,
        _fav: FAVORITES[id],
        _collectedAt: new Date(FAVORITES[id].collected_at),
      });
    }
  }

  // 按"收藏时间"范围筛选
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekAgo = new Date(todayStart.getTime() - 6 * 86400000);
  const monthAgo = new Date(todayStart.getTime() - 29 * 86400000);

  if (activeFilters.favRange === 'today') {
    collected = collected.filter(a => a._collectedAt >= todayStart);
  } else if (activeFilters.favRange === 'week') {
    collected = collected.filter(a => a._collectedAt >= weekAgo);
  } else if (activeFilters.favRange === 'month') {
    collected = collected.filter(a => a._collectedAt >= monthAgo);
  }

  // 🆕 在按 myTag 筛之前, 保存一份用于计算 chip 计数
  const collectedBeforeTagFilter = [...collected];

  // 按个人标签筛选
  if (activeFilters.myTag) {
    collected = collected.filter(a => (a._fav.tags || []).includes(activeFilters.myTag));
  }

  // 搜索过滤
  if (activeFilters.searchTerm) {
    const term = activeFilters.searchTerm.toLowerCase();
    collected = collected.filter(a =>
      a.title.toLowerCase().includes(term) ||
      (a.summary || '').toLowerCase().includes(term) ||
      (a.meaning || '').toLowerCase().includes(term) ||
      (a._fav.note || '').toLowerCase().includes(term) ||
      (a._fav.tags || []).some(t => t.toLowerCase().includes(term)) ||
      a.companies.some(c => c.toLowerCase().includes(term))
    );
  }

  // 按"原文早报日期"分组(降序)
  const groups = {};
  for (const a of collected) {
    if (!groups[a.date]) groups[a.date] = [];
    groups[a.date].push(a);
  }
  const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  metaEl.textContent = `共 ${collected.length} 篇 · 来自 ${sortedDates.length} 份早报`;

  // 工具栏 HTML
  const rangeLabel = {today: '今天', week: '本周(7 天)', month: '本月(30 天)', all: '全部'}[activeFilters.favRange];

  // 🆕 计算"当前所选 favRange 范围内"的所有可见标签
  // 用按 myTag 筛之前的列表算计数(否则只能看到当前选的标签)
  const visibleTagCounter = {};
  for (const a of collectedBeforeTagFilter) {
    for (const t of (a._fav && a._fav.tags) || []) {
      visibleTagCounter[t] = (visibleTagCounter[t] || 0) + 1;
    }
  }
  // 如果当前正在按某 myTag 筛选,即使这个标签在当前范围 0 次,也要显示
  if (activeFilters.myTag && !visibleTagCounter[activeFilters.myTag]) {
    visibleTagCounter[activeFilters.myTag] = 0;
  }
  const visibleTags = Object.entries(visibleTagCounter).sort((a, b) => b[1] - a[1]);

  // 渲染标签 chip 行(如果当前范围内有标签)
  let tagsBarHtml = '';
  if (visibleTags.length > 0) {
    const chips = visibleTags.map(([tag, count]) => {
      const isActive = activeFilters.myTag === tag;
      return `<button class="fav-tag-chip ${isActive ? 'active' : ''}" data-favtag="${escapeHtml(tag)}">#${escapeHtml(tag)} <span class="chip-count">${count}</span></button>`;
    }).join('');
    const clearBtn = activeFilters.myTag
      ? `<button class="fav-tag-chip fav-tag-clear" data-favtag="">✕ 清除筛选</button>`
      : '';
    tagsBarHtml = `
      <div class="fav-tags-bar">
        <span class="fav-tags-label">按标签:</span>
        <div class="fav-tags-list">${chips}${clearBtn}</div>
      </div>
    `;
  }

  const toolbarHtml = `
    <div class="favorites-toolbar">
      <span class="fav-summary">${rangeLabel}收藏:</span>
      <div class="fav-range-tabs">
        <button class="fav-range-tab ${activeFilters.favRange === 'today' ? 'active' : ''}" data-favrange="today">今天</button>
        <button class="fav-range-tab ${activeFilters.favRange === 'week' ? 'active' : ''}" data-favrange="week">本周</button>
        <button class="fav-range-tab ${activeFilters.favRange === 'month' ? 'active' : ''}" data-favrange="month">本月</button>
        <button class="fav-range-tab ${activeFilters.favRange === 'all' ? 'active' : ''}" data-favrange="all">全部</button>
      </div>
      <button class="fav-export-btn" id="export-md-btn" ${collected.length === 0 ? 'disabled' : ''}>
        📥 导出 Markdown
      </button>
    </div>
    ${tagsBarHtml}
  `;

  // 空状态
  if (collected.length === 0) {
    listEl.innerHTML = toolbarHtml + `
      <div class="fav-empty">
        ${activeFilters.favRange === 'all' ? '尚未收藏任何文章' : '该时间范围内无收藏'}
        <div class="tip">
          ${Object.keys(FAVORITES).length === 0
            ? '在文章卡片右上角点 🔖 加入收藏<br>收藏时可加备注 + 个人标签<br>之后随时回到这里浏览 / 导出'
            : `已有 ${Object.keys(FAVORITES).length} 篇收藏,切换其他时间范围查看`}
        </div>
      </div>
    `;
    bindFavRangeTabs();
    bindFavTagChips();
    bindExportBtn(collected, sortedDates, groups);
    renderActiveFiltersBar();
    return;
  }

  // 渲染分组卡片
  let html = toolbarHtml;
  for (const date of sortedDates) {
    const dayArticles = groups[date];
    const weekday = getWeekday(date);
    html += `
      <div class="fav-day-group">
        <div class="fav-day-header">
          📅 ${date} · ${weekday}
          <span class="day-meta">${dayArticles.length} 篇收藏</span>
        </div>
        <div class="article-list">
          ${dayArticles.map(a => renderCard(a)).join('')}
        </div>
      </div>
    `;
  }
  listEl.innerHTML = html;

  // 绑卡片事件(收藏按钮 / 公司 chip / 展开)
  listEl.querySelectorAll('.article-card').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('bookmark-btn') || e.target.closest('.bookmark-btn')) {
        e.stopPropagation();
        const btn = e.target.classList.contains('bookmark-btn') ? e.target : e.target.closest('.bookmark-btn');
        openBookmarkModal(btn.dataset.bookmarkId);
        return;
      }
      if (e.target.classList.contains('my-tag')) {
        e.stopPropagation();
        activeFilters.myTag = e.target.dataset.mytag;
        renderActiveFilterStates();
        renderArticles();
        return;
      }
      if (e.target.classList.contains('company-chip')) {
        e.stopPropagation();
        activeFilters.company = e.target.textContent;
        activeFilters.view = 'all';  // 点公司chip 自动跳出收藏视图
        renderActiveFilterStates();
        renderArticles();
        return;
      }
      el.classList.toggle('expanded');
    });
  });

  bindFavRangeTabs();
  bindFavTagChips();
  bindExportBtn(collected, sortedDates, groups);
  renderActiveFiltersBar();
}

function bindFavRangeTabs() {
  document.querySelectorAll('.fav-range-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeFilters.favRange = tab.dataset.favrange;
      renderArticles();
    });
  });
}

function bindFavTagChips() {
  document.querySelectorAll('.fav-tag-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const tag = chip.dataset.favtag;
      if (!tag) {
        // 清除筛选
        activeFilters.myTag = null;
      } else if (activeFilters.myTag === tag) {
        // 已选 → 取消
        activeFilters.myTag = null;
      } else {
        activeFilters.myTag = tag;
      }
      renderActiveFilterStates();
      renderArticles();
    });
  });
}

function bindExportBtn(articles, sortedDates, groups) {
  const btn = document.getElementById('export-md-btn');
  if (!btn) return;
  btn.addEventListener('click', () => {
    exportToMarkdown(articles, sortedDates, groups);
  });
}

function getWeekday(dateStr) {
  const d = new Date(dateStr);
  return ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
}

// ═══════════════════════════════════════════════════════════════════
// 🔖 收藏 modal(添加 / 编辑 / 删除)
// ═══════════════════════════════════════════════════════════════════
let currentBookmarkId = null;

function openBookmarkModal(articleId) {
  currentBookmarkId = articleId;
  const article = DATA.articles.find(a => a.id === articleId);
  if (!article) return;

  const fav = FAVORITES[articleId];

  document.getElementById('bm-target').innerHTML = `
    <strong>${escapeHtml(article.title)}</strong><br>
    <span style="color: var(--ink-3); font-size: 0.78rem;">${article.date} · ${article.dimension || ''}</span>
  `;
  document.getElementById('bm-note').value = fav ? (fav.note || '') : '';
  document.getElementById('bm-tags').value = fav ? (fav.tags || []).join(', ') : '';
  document.getElementById('bm-remove').style.display = fav ? 'inline-block' : 'none';
  document.getElementById('bm-save').textContent = fav ? '更新' : '保存收藏';

  // 🆕 渲染历史标签区(从所有已收藏文章里提取过去用过的标签)
  renderExistingTagsInModal(fav ? (fav.tags || []) : []);

  document.getElementById('bm-overlay').classList.add('open');
  setTimeout(() => document.getElementById('bm-note').focus(), 50);
}

// 🆕 渲染收藏面板里的"已有标签快速选择"区
function renderExistingTagsInModal(currentSelectedTags) {
  const allTags = getAllMyTags();  // 已有的全部个人标签 + 出现次数
  const area = document.getElementById('existing-tags-area');
  const list = document.getElementById('existing-tags-list');

  if (allTags.length === 0) {
    // 没有任何历史标签 → 隐藏整个区域
    area.style.display = 'none';
    return;
  }

  area.style.display = 'block';
  list.innerHTML = '';

  // 当前已经在 input 里的标签
  const selectedSet = new Set(currentSelectedTags.map(t => t.toLowerCase()));

  for (const [tag, count] of allTags) {
    const chip = document.createElement('span');
    chip.className = 'existing-tag-chip';
    if (selectedSet.has(tag.toLowerCase())) chip.classList.add('selected');
    chip.innerHTML = `${escapeHtml(tag)} <span class="count">${count}</span>`;
    chip.dataset.tag = tag;

    chip.addEventListener('click', () => {
      const input = document.getElementById('bm-tags');
      const current = input.value.split(/[,，]/).map(t => t.trim()).filter(Boolean);
      const tagLower = tag.toLowerCase();
      const idx = current.findIndex(t => t.toLowerCase() === tagLower);

      if (idx >= 0) {
        // 已选 → 移除
        current.splice(idx, 1);
        chip.classList.remove('selected');
      } else {
        // 未选 → 添加
        current.push(tag);
        chip.classList.add('selected');
      }

      input.value = current.join(', ');
    });

    list.appendChild(chip);
  }
}

function closeBookmarkModal() {
  document.getElementById('bm-overlay').classList.remove('open');
  currentBookmarkId = null;
}

function saveBookmarkFromModal() {
  if (!currentBookmarkId) return;
  const note = document.getElementById('bm-note').value;
  const tagsRaw = document.getElementById('bm-tags').value;
  const tags = tagsRaw.split(/[,，]/).map(t => t.trim().replace(/^#/, '')).filter(Boolean);
  const isUpdate = !!FAVORITES[currentBookmarkId];

  if (isUpdate) {
    updateFavorite(currentBookmarkId, note, tags);
    showToast('✓ 收藏已更新');
  } else {
    addFavorite(currentBookmarkId, note, tags);
    showToast('✓ 已收藏');
  }
  closeBookmarkModal();
  renderViewCounts();
  renderMyTagList();
  renderArticles();
}

function removeBookmarkFromModal() {
  if (!currentBookmarkId) return;
  removeFavorite(currentBookmarkId);
  showToast('已取消收藏');
  closeBookmarkModal();
  renderViewCounts();
  renderMyTagList();
  renderArticles();
}

// ═══════════════════════════════════════════════════════════════════
// 📥 导出 Markdown
// ═══════════════════════════════════════════════════════════════════
function exportToMarkdown(articles, sortedDates, groups) {
  const now = new Date();
  const exportDate = now.toISOString().slice(0, 10);
  const exportTime = now.toLocaleString('zh-CN', { hour12: false });
  const rangeLabel = {today: '今天', week: '本周(过去 7 天)', month: '本月(过去 30 天)', all: '全部'}[activeFilters.favRange];

  let md = `# 我的 AI 早报精选\n\n`;
  md += `> **导出时间**:${exportTime}\n`;
  md += `> **范围**:${rangeLabel}收藏\n`;
  md += `> **共 ${articles.length} 篇文章 · 来自 ${sortedDates.length} 份早报**\n`;
  if (activeFilters.myTag) {
    md += `> **标签筛选**:#${activeFilters.myTag}\n`;
  }
  md += `\n---\n\n`;

  for (const date of sortedDates) {
    const weekday = getWeekday(date);
    const dayArticles = groups[date];

    md += `## 📅 ${date} · ${weekday}\n\n`;
    md += `*${dayArticles.length} 篇收藏来自这份早报*\n\n`;

    dayArticles.forEach((a, idx) => {
      md += `### ${idx + 1}. ${a.title}\n\n`;

      // 元数据行
      const metaItems = [];
      if (a.dimension) metaItems.push(a.dimension);
      if (a.is_top5) metaItems.push('⭐ Top 5');
      if (a.is_tier0) metaItems.push('🧠 Tier 0');
      if (a.source) metaItems.push(`来源:${a.source}`);
      if (a.quality_score) metaItems.push(`质量 ${a.quality_score}/8`);
      if (metaItems.length > 0) {
        md += `> ${metaItems.join(' · ')}\n\n`;
      }

      // 摘要
      if (a.summary) {
        md += `${a.summary}\n\n`;
      }

      // 这意味着
      if (a.meaning) {
        md += `**📌 这意味着**:${a.meaning}\n\n`;
      }

      // 个人备注
      if (a._fav && a._fav.note) {
        md += `**💭 我的备注**:${a._fav.note}\n\n`;
      }

      // 个人标签
      if (a._fav && a._fav.tags && a._fav.tags.length > 0) {
        md += `**🏷️ 标签**:${a._fav.tags.map(t => `#${t}`).join(' ')}\n\n`;
      }

      // 公司
      if (a.companies && a.companies.length > 0) {
        md += `**🏢 涉及公司**:${a.companies.join('、')}\n\n`;
      }

      // 原文链接
      if (a.url) {
        md += `🔗 [原文链接](${a.url})\n\n`;
      }

      md += `---\n\n`;
    });
  }

  md += `\n*由「响哥 AI 早报」自动生成 · ${exportDate}*\n`;

  // 触发下载
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `AI早报精选-${exportDate}-${activeFilters.favRange}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast(`✓ 已导出 ${articles.length} 篇收藏`);
}

// ═══════════════════════════════════════════════════════════════════
// Toast 提示
// ═══════════════════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function highlight(text, term) {
  if (!text || !term) return text || '';
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

// ═══════════════════════════════════════════════════════════════════
// active filter 标签栏
// ═══════════════════════════════════════════════════════════════════
function renderActiveFiltersBar() {
  const bar = document.getElementById('active-filters-bar');
  const filters = [];

  if (activeFilters.myTag) {
    filters.push({ label: '#' + activeFilters.myTag, key: 'myTag' });
  }
  if (activeFilters.dimension) {
    filters.push({ label: activeFilters.dimension, key: 'dimension' });
  }
  if (activeFilters.company) {
    filters.push({ label: '🏢 ' + activeFilters.company, key: 'company' });
  }
  if (activeFilters.searchTerm) {
    filters.push({ label: '🔍 ' + activeFilters.searchTerm, key: 'searchTerm' });
  }
  if (activeFilters.view !== 'all') {
    const viewLabel = { favorites: '🔖 我的收藏', top5: '⭐ Top 5', tier0: '🧠 Tier 0', recent7: '🗓 最近 7 天' }[activeFilters.view];
    if (viewLabel) filters.push({ label: viewLabel, key: 'view' });
  }

  if (filters.length === 0) {
    bar.classList.remove('active-filters');
    bar.innerHTML = '';
    return;
  }

  bar.className = 'active-filters';
  bar.innerHTML = filters.map(f =>
    `<span class="active-filter">${f.label}<span class="remove" data-key="${f.key}">×</span></span>`
  ).join('');

  bar.querySelectorAll('.remove').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.key;
      if (key === 'view') activeFilters.view = 'all';
      else activeFilters[key] = null;
      if (key === 'searchTerm') document.getElementById('search-input').value = '';
      renderActiveFilterStates();
      renderArticles();
    });
  });
}

function renderActiveFilterStates() {
  // 视图
  document.querySelectorAll('#view-list .filter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === activeFilters.view);
  });
  // 维度
  document.querySelectorAll('#dimension-list .filter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.dimension === activeFilters.dimension);
  });
  // 公司
  document.querySelectorAll('#company-list .filter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.company === activeFilters.company);
  });
  // 我的标签
  document.querySelectorAll('#mytag-list .filter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.mytag === activeFilters.myTag);
  });
}

function updateContentTitle() {
  const titleEl = document.getElementById('content-title');
  if (activeFilters.view === 'favorites') {
    titleEl.textContent = '🔖 我的收藏';
  } else if (activeFilters.myTag) {
    titleEl.textContent = '#' + activeFilters.myTag;
  } else if (activeFilters.dimension) {
    titleEl.textContent = activeFilters.dimension;
  } else if (activeFilters.company) {
    titleEl.textContent = '🏢 ' + activeFilters.company;
  } else if (activeFilters.searchTerm) {
    titleEl.textContent = '🔍 ' + activeFilters.searchTerm;
  } else if (activeFilters.view === 'top5') {
    titleEl.textContent = '⭐ Top 5(每日重磅)';
  } else if (activeFilters.view === 'tier0') {
    titleEl.textContent = '🧠 Tier 0 深度参考';
  } else if (activeFilters.view === 'recent7') {
    titleEl.textContent = '🗓 最近 7 天';
  } else {
    titleEl.textContent = '📚 全部早报';
  }
}

// ═══════════════════════════════════════════════════════════════════
// 事件绑定
// ═══════════════════════════════════════════════════════════════════
function setupEvents() {
  // 视图筛选
  document.querySelectorAll('#view-list .filter-item').forEach(el => {
    el.addEventListener('click', () => {
      activeFilters.view = el.dataset.view;
      renderActiveFilterStates();
      renderArticles();
    });
  });

  // 维度筛选
  document.querySelectorAll('#dimension-list .filter-item').forEach(el => {
    el.addEventListener('click', () => {
      const dim = el.dataset.dimension;
      activeFilters.dimension = (activeFilters.dimension === dim) ? null : dim;
      renderActiveFilterStates();
      renderArticles();
    });
  });

  // 公司筛选
  document.querySelectorAll('#company-list .filter-item').forEach(el => {
    el.addEventListener('click', () => {
      const c = el.dataset.company;
      activeFilters.company = (activeFilters.company === c) ? null : c;
      renderActiveFilterStates();
      renderArticles();
    });
  });

  // 搜索
  const searchInput = document.getElementById('search-input');
  let searchTimer = null;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      activeFilters.searchTerm = e.target.value.trim();
      renderArticles();
    }, 200);
  });

  // / 快捷键聚焦搜索框
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
    } else if (e.key === 'Escape' && document.activeElement === searchInput) {
      searchInput.blur();
      searchInput.value = '';
      activeFilters.searchTerm = '';
      renderArticles();
    }
  });

  // 排序
  document.querySelectorAll('.view-tab').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      activeFilters.sort = el.dataset.sort;
      renderArticles();
    });
  });

  // 清空筛选
  document.getElementById('clear-btn').addEventListener('click', () => {
    activeFilters = {
      view: 'all',
      dimension: null,
      company: null,
      myTag: null,
      searchTerm: '',
      sort: 'date-desc',
      favRange: 'all',
    };
    document.getElementById('search-input').value = '';
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.view-tab[data-sort="date-desc"]').classList.add('active');
    renderActiveFilterStates();
    renderArticles();
  });

  // 🔖 收藏 modal 按钮绑定
  document.getElementById('bm-save').addEventListener('click', saveBookmarkFromModal);
  document.getElementById('bm-cancel').addEventListener('click', closeBookmarkModal);
  document.getElementById('bm-remove').addEventListener('click', removeBookmarkFromModal);
  document.getElementById('bm-overlay').addEventListener('click', (e) => {
    // 点 overlay 背景关闭(但不点 modal 本身)
    if (e.target.id === 'bm-overlay') closeBookmarkModal();
  });
  // Esc 关闭收藏 modal
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.getElementById('bm-overlay').classList.contains('open')) {
      closeBookmarkModal();
    }
  });
  // Ctrl+Enter 保存收藏
  document.getElementById('bm-note').addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      saveBookmarkFromModal();
    }
  });
  // 🆕 用户手动输入标签时,实时刷新历史标签 chip 的选中状态
  document.getElementById('bm-tags').addEventListener('input', () => {
    const currentTags = document.getElementById('bm-tags').value
      .split(/[,，]/).map(t => t.trim().toLowerCase()).filter(Boolean);
    document.querySelectorAll('.existing-tag-chip').forEach(chip => {
      const tag = chip.dataset.tag.toLowerCase();
      chip.classList.toggle('selected', currentTags.includes(tag));
    });
  });
}

load();
</script>
